name: HAT-XS_SRx2_Video_exp1_720

# tile:
#   tile_size: 256  # must be a multiple of window_size (16)
#   tile_pad: 32    # overlap between tiles; must be a multiple of window_size (16)

model_type: HATModel
scale: 2
num_gpu: 1
manual_seed: 0

datasets:
  test_1:
    name: VC_SRx2_360p
    type: VideoPairedDataset
    dataroot_hr: datasets/VC_testing_360p_720p
    scale: 2
    hr_height: 720
    hr_width: 1280
    batch_size: 24
    io_backend:
      type: disk

# network structures
network_g:
  type: HAT
  upscale: 2
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 9
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 108
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: ./experiments/train_HAT-XS_SRx2_exp1_compress9/models/net_g_300000.pth
  strict_load_g: true
  param_key_g: 'params_ema'

# validation settings
val:
  save_img: true
  suffix: ~
