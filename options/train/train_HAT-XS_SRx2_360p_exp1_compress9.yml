# Experiment 1: compress_ratio=9 (CAB mid-ch: 108//12=9, vs 36 at ratio=3)
# Hypothesis: Authors use ratio=24 for DF2K-only (3.5k images) and ratio=3 for ImageNet
#   pretraining (1M images). Our 300k dataset sits between these regimes, so ratio=12
#   is a principled middle ground: saves ~435 GMACs (-24%) vs the current ratio=3
#   while keeping more expressiveness than the tiny 4-channel bottleneck of ratio=24.
name: train_HAT-XS_SRx2_exp1_compress9
model_type: HATModel
scale: 2
num_gpu: 1
manual_seed: 0

datasets:
  train:
    name: VC360p
    type: PairedImageDataset
    dataroot_gt: /home/manish/Data/Video_Compression_360p/training_data_v3/train/train_hq
    dataroot_lq: /home/manish/Data/Video_Compression_360p/training_data_v3/train/train_lq
    io_backend:
      type: disk

    gt_size: 128
    use_hflip: true
    use_rot: true

    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 6
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: VC360p_val
    type: PairedImageDataset
    dataroot_gt: /home/manish/Data/Video_Compression_360p/training_data_v3/val_2/val_hq
    dataroot_lq: /home/manish/Data/Video_Compression_360p/training_data_v3/val_2/val_lq
    io_backend:
      type: disk

# network structures
network_g:
  type: HAT
  upscale: 2
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 9
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 108
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [150000, 240000, 270000, 285000]
    gamma: 0.5

  total_iter: 300000
  warmup_iter: -1

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: !!float 1e4
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: false
      better: higher
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: false
      better: higher

  early_stop:
    metric: psnr
    min_delta: 0.01
    patience: 5

logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29505

# python hat/train.py -opt options/train/train_HAT-XS_SRx2_360p_expE_compress9.yml
