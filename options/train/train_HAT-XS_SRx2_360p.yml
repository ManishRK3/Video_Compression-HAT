# general settings
name: train_HAT-XS_SRx2_from_scratch
model_type: HATModel
scale: 2
num_gpu: 1
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: VC360p
    type: PairedImageDataset
    dataroot_gt: /home/manish/Data/Video_Compression_360p/training_data_v3/train/train_hq
    dataroot_lq: /home/manish/Data/Video_Compression_360p/training_data_v3/train/train_lq
    # meta_info_file: hat/data/meta_info/meta_info_DF2Ksub_GT.txt
    io_backend:
      type: disk

    gt_size: 128
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 6
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: VC360p_val
    type: PairedImageDataset
    dataroot_gt: /home/manish/Data/Video_Compression_360p/training_data_v3/val_2/val_hq
    dataroot_lq: /home/manish/Data/Video_Compression_360p/training_data_v3/val_2/val_lq
    io_backend:
      type: disk

  # val_2:
  #   name: Set14
  #   type: PairedImageDataset
  #   dataroot_gt: ./datasets/Set14/GTmod2
  #   dataroot_lq: ./datasets/Set14/LRbicx2
  #   io_backend:
  #     type: disk

  # val_3:
  #   name: Urban100
  #   type: PairedImageDataset
  #   dataroot_gt: ./datasets/urban100/GTmod2
  #   dataroot_lq: ./datasets/urban100/LRbicx2
  #   io_backend:
  #     type: disk


# network structures
network_g:
  type: HAT
  upscale: 2
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 108
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    # milestones: [300000, 500000, 650000, 700000, 750000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 1e4
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: flase
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: false
      better: higher  # the higher, the better. Default: higher

  early_stop:
    metric: psnr        # which metric to watch
    min_delta: 0.01     # minimum improvement in dB to count as progress
    patience: 5         # stop after this many consecutive validations with no improvement

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500

