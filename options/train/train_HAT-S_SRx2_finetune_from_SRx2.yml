# general settings
name: train_HAT-S_SRx2_finetune_from_SRx2
model_type: HATModelPatched
scale: 2
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: VC__ff_train
    type: ImageNetPairedDatasetFullFrame  # Use the new dataloader that generates LQ on-the-fly
    dataroot_gt: /home/manishreddy/Downloads/VC/Video_Compression/road_train_sample_data
    # dataroot_lq removed; LQ will be generated by the dataloader
    # meta_info_file: hct/data/meta_info/meta_info_DF2Ksub_GT.txt
    io_backend:
      type: disk

    gt_size: 64
    use_hflip: true
    use_rot: false

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: VC_ff_Val
    type: ImageNetPairedDatasetFullFrame
    dataroot_gt: /home/manishreddy/Downloads/VC/Video_Compression/road_test_data
    # dataroot_lq removed
    io_backend:
      type: disk

  # val_2:
  #   name: Set14
  #   type: ImageNetPairedDatasetFullFrame
  #   dataroot_gt: datasets/Set14/GTmod4
  #   # dataroot_lq removed
  #   io_backend:
  #     type: disk

  # val_3:
  #   name: Urban100
  #   type: ImageNetPairedDatasetFullFrame
  #   dataroot_gt: datasets/urban100/GTmod4
  #   # dataroot_lq removed
  #   io_backend:
  #     type: disk


# network structures
network_g:
  type: HAT
  upscale: 2
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 24
  squeeze_factor: 24
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 144
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: ./experiments/pretrained_models/HAT-S_SRx2.pth
  strict_load_g: false
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [125000, 200000, 225000, 240000]
    gamma: 0.5

  total_iter: 20
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  # val_freq: !!float 2e4
  val_freq: 10
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 100
  # save_checkpoint_freq: !!float 2e4
  save_checkpoint_freq: 10
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
